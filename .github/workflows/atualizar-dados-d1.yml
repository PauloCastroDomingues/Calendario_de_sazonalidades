name: Atualizar dados D-1

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Data inicial opcional no formato YYYY-MM-DD"
        required: false
        type: string
      end_date:
        description: "Data final opcional no formato YYYY-MM-DD. Vazio usa D-1."
        required: false
        type: string
      lookback_days:
        description: "Janela retroativa quando start_date estiver vazio"
        required: false
        default: "760"
        type: string

permissions:
  contents: write

concurrency:
  group: atualizar-dados-d1
  cancel-in-progress: false

jobs:
  exportar-bigquery:
    name: Exportar BigQuery para JSON
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar configuracao BigQuery
        id: bq_config
        env:
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$BQ_PROJECT_ID" ] || [ -z "$BQ_SERVICE_ACCOUNT_JSON" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "BigQuery ainda nao configurado. Configure BQ_PROJECT_ID e BQ_SERVICE_ACCOUNT_JSON para ativar a exportacao D-1."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Preparar Python
        if: steps.bq_config.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        if: steps.bq_config.outputs.configured == 'true'
        run: python -m pip install -r requirements.txt

      - name: Criar credencial BigQuery
        if: steps.bq_config.outputs.configured == 'true'
        env:
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$BQ_SERVICE_ACCOUNT_JSON" > credentials/reise-bigquery-sa.json

      - name: Montar argumentos opcionais
        if: steps.bq_config.outputs.configured == 'true'
        id: args
        shell: bash
        run: |
          ARGS=""
          if [ -n "${{ inputs.start_date }}" ]; then
            ARGS="$ARGS --start-date ${{ inputs.start_date }}"
          fi
          if [ -n "${{ inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ inputs.end_date }}"
          fi
          LOOKBACK="${{ inputs.lookback_days }}"
          if [ -z "$LOOKBACK" ]; then
            LOOKBACK="760"
          fi
          ARGS="$ARGS --lookback-days $LOOKBACK"
          echo "value=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Estimar custo BigQuery
        if: steps.bq_config.outputs.configured == 'true'
        env:
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_CREDENTIALS_PATH: credentials/reise-bigquery-sa.json
          BQ_MAX_BYTES_BILLED: ${{ vars.BQ_MAX_BYTES_BILLED || '1073741824' }}
        run: python scripts/exportar_bigquery_d1.py --dry-run ${{ steps.args.outputs.value }}

      - name: Exportar snapshot D-1
        if: steps.bq_config.outputs.configured == 'true'
        env:
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_CREDENTIALS_PATH: credentials/reise-bigquery-sa.json
          BQ_MAX_BYTES_BILLED: ${{ vars.BQ_MAX_BYTES_BILLED || '1073741824' }}
        run: python scripts/exportar_bigquery_d1.py ${{ steps.args.outputs.value }}

      - name: Validar arquivos gerados
        if: steps.bq_config.outputs.configured == 'true'
        run: |
          python -m json.tool data/kpis_dia.json > /dev/null
          python -m json.tool data/funil_dia.json > /dev/null
          python -m json.tool data/produtos_dia.json > /dev/null
          python -m json.tool data/campanhas_dia.json > /dev/null
          python -m json.tool data/utms_dia.json > /dev/null
          python -m json.tool data/estoque.json > /dev/null
          python -m json.tool data/manifest.json > /dev/null

      - name: Commitar snapshot
        if: steps.bq_config.outputs.configured == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "Nenhuma mudanca nos dados D-1."
            exit 0
          fi
          git commit -m "Update D-1 commercial data"
          git push
